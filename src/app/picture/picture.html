<div class="container" *ngIf="picture; else loading">
    <h2 class="title">{{picture.title | uppercase}}</h2>
    <div class="card">
        <img [src]="picture.image" [alt]="picture.title" class="main-img">
        <div class="info">
            <p><strong>Author:</strong> {{picture.author}}</p>
            <p><strong>Year:</strong> {{picture.year}}</p>
            <p><strong>Size:</strong> {{picture.size}}</p>
            <p><strong>Location:</strong> {{picture.location}}</p>
            <p><strong>Description:</strong> {{picture.description}}</p>
        </div>
    </div>
</div>

<ng-template #loading>
    <div class="loader">
        <p>Picture uploading...</p>
    </div>
</ng-template>
